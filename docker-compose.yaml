# docker-compose.yaml — Production configuration
# ─────────────────────────────────────────────────────────────────────────────
# USAGE:
#   1. Copy .env.example → .env  and fill in all CHANGE_ME values.
#   2. docker compose up -d
#
# Secrets are loaded from the .env file (never committed to source control).
# ─────────────────────────────────────────────────────────────────────────────

version: '3.8'

x-airflow-env: &airflow-env
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
    postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
  AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "30"
  AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
  PYTHONPATH: /opt/airflow/scripts:/opt/airflow
  KAGGLE_USERNAME: ${KAGGLE_USERNAME}
  KAGGLE_KEY: ${KAGGLE_KEY}

x-airflow-volumes: &airflow-volumes
  - ./airflow_dags:/opt/airflow/dags:ro
  - ./scripts:/opt/airflow/scripts:ro
  - ./spark_jobs:/opt/airflow/spark_jobs:ro
  - ./config:/opt/airflow/config:ro
  - airflow_logs:/opt/airflow/logs
  - data_volume:/opt/airflow/data

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ── pgAdmin ─────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Airflow init (runs once) ─────────────────────────────────────────────────
  airflow-init:
    build: .
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-env
    entrypoint: /bin/bash
    command: >
      -c "
        airflow db migrate &&
        airflow users create
          --username ${AIRFLOW_ADMIN_USER}
          --password ${AIRFLOW_ADMIN_PASSWORD}
          --firstname Admin
          --lastname User
          --role Admin
          --email ${AIRFLOW_ADMIN_EMAIL}
          2>/dev/null || true
      "

  # ── Airflow Webserver ────────────────────────────────────────────────────────
  airflow-webserver:
    build: .
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes: *airflow-volumes
    environment:
      <<: *airflow-env
    command: airflow webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # ── Airflow Scheduler ────────────────────────────────────────────────────────
  airflow-scheduler:
    build: .
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes: *airflow-volumes
    environment:
      <<: *airflow-env
    command: airflow scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

volumes:
  postgres_data:
  pgadmin_data:
  airflow_logs:
  data_volume:
